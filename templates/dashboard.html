<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart Farming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="navbar">
    <div class="container nav-container">
        <h2 class="logo">🌱 Smart Farming</h2>
        <a href="/"><button class="btn">Home</button></a>
        <a href="{{ url_for('home') }}"><button class="btn logout-btn">Logout</button></a>
    </div>
</header>

<section class="dashboard">
  <div class="container">
    <div class="dashboard-cards">
        <div class="weather-hero">
    <div class="container">
        <div class="hero-top-bar">
            <h1 class="hero-title">Agricultural Insights</h1>
            
            <div class="location-sync-pill" onclick="updateWeatherByGPS()" title="Click to Sync Location">
                <div class="pill-pulse"></div>
                <i class="fas fa-map-marker-alt"></i>
                <span id="city-name">Bhopal</span>
                <i class="fas fa-sync-alt sync-icon"></i>
            </div>
        </div>

        <div class="weather-grid">
            <div class="weather-glass-card">
                <div class="icon-box temp"><i class="fas fa-thermometer-half"></i></div>
                <div class="data-box">
                    <small>Temperature</small>
                    <h2 id="temp">--°C</h2>
                </div>
            </div>

            <div class="weather-glass-card">
                <div class="icon-box hum"><i class="fas fa-tint"></i></div>
                <div class="data-box">
                    <small>Humidity</small>
                    <h2 id="humidity">--%</h2>
                </div>
            </div>

            <div class="weather-glass-card">
                <div class="icon-box wind"><i class="fas fa-wind"></i></div>
                <div class="data-box">
                    <small>Wind Speed</small>
                    <h2 id="wind-speed">12 km/h</h2>
                </div>
            </div>
        </div>

        <input type="hidden" id="lat" value="23.25">
        <input type="hidden" id="lon" value="77.41">
    </div>
</div>
    </div>

    <div class="main-grid">
  <div class="input-section">
    <h3 class="section-title"><i class="fas fa-map-marked-alt"></i> Farm Details</h3>
    
    <div class="form-grid">
      <div class="input-group">
        <label for="state"><i class="fas fa-flag"></i> State</label>
        <select id="state">
          <option value="">Select State</option>
        </select>
      </div>

      <div class="input-group">
        <label for="district"><i class="fas fa-city"></i> District</label>
        <select id="district">
          <option value="">Select District</option>
        </select>
      </div>

      <div class="input-group">
        <label for="block"><i class="fas fa-th-large"></i> Block</label>
        <select id="block">
          <option value="">Select Block</option>
        </select>
      </div>

      <div class="input-group">
        <label for="village"><i class="fas fa-home"></i> Village</label>
        <select id="village">
          <option value="">Select Village</option>
        </select>
      </div>
    </div>

    <button class="analyze-btn" onclick="getCropPrediction()">
      <i class="fas fa-search"></i> Analyze Farm
    </button>
  </div>

  <div class="insight-section">
      <h3 class="insight-title">🌿 Analysis Results</h3>
      <div id="prediction-result">
          <p style="text-align: center; color: #777;">Click Analyze to see recommendations.</p>
      </div>
  </div>
</div>
</div>
</section>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
